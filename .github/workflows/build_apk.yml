name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest

    steps:
      - uses: actions/checkout@v4

      - name: Accept licenses
        run: |
          mkdir -p /github/home/.buildozer/android/platform/android-sdk/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > /github/home/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> /github/home/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> /github/home/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" >> /github/home/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" >> /github/home/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "504667f4c0de7af1a06de9f4b1727b84351f2910" >> /github/home/.buildozer/android/platform/android-sdk/licenses/google-gdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > /github/home/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          ls -la bin/ 2>/dev/null || echo "No bin dir"
          exit $BUILD_EXIT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Shadow-Monarch-APK
          path: bin/*.apk
          if-no-files-found: warn

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Build-Logs
          path: build.log
