name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Build with Buildozer (Debug Mode for Verbose Logging)
        run: |
          buildozer android debug
        env:
          # Enable verbose output
          BUILDOZER_VERBOSE: 1
          # Log level for buildozer
          BUILDOZER_LOG_LEVEL: 2

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: King-System-App
          path: bin/*.apk

      - name: Upload Build Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Build-Logs
          path: |
            .buildozer/android/debug/build-*.txt
            .buildozer/android/debug/log*.txt
