name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          ls -la bin/ 2>/dev/null || echo "No bin dir"
          exit $BUILD_EXIT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Shadow-Monarch-APK
          path: bin/*.apk
          if-no-files-found: warn

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Build-Logs
          path: build.log
