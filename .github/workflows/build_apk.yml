name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build with ArtemSBulgakov action
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: stable

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Shadow-Monarch-APK
          path: ${{ steps.buildozer.outputs.filename }}

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Build-Logs
          path: build.log
